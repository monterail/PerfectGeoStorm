services:
  web:
    image: ghcr.io/geostorm-ai/geostorm:latest
    ports:
      - "8080:8080"
    volumes:
      - geostorm-data:/app/data
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  geostorm-data:
